        container.innerHTML = `
            <div style="padding: 40px; opacity: 0.6;">
                <p>Oops, I haven't made any apps yet!</p>
                <p style="font-size: 1.2rem; margin-bottom: 10px;">Empty... for now.</p>
                <p>Check back later for updates!</p>
                <p>Remember to do Ctrl + Shift + R to refresh the page and see new projects when I add them!</p>
            </div>
        `;
    }
</script>
